<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checking heartbeat · OneClick BRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f6f7;
      --surface: #fff;
      --accent: #3a7582;
      --muted: #64748b;
      --border: #e2e8f0;
      font-family: "DM Sans", system-ui, sans-serif;
    }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: #0f172a;
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      text-align: center; background: var(--surface); padding: 2.5rem 2rem; border-radius: 16px;
      border: 1px solid var(--border); box-shadow: 0 10px 40px -12px rgba(58, 117, 130, 0.12);
      max-width: 400px;
    }
    .mark { width: 48px; height: 48px; margin: 0 auto 1rem; border-radius: 14px; background: linear-gradient(145deg, #4d92a3, #3a7582); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; font-weight: 700; }
    p.muted { color: var(--muted); font-size: 0.95rem; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true"></div>
    <h1>Checking heartbeat…</h1>
    <p class="muted">Contacting the server. Please wait.</p>
  </div>
  <script>
    setInterval(() => location.reload(), 1500);
  </script>
</body>
</html>
