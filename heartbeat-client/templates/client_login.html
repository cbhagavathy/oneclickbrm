<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · OneClick BRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f6f7;
      --surface: #ffffff;
      --accent: #3a7582;
      --accent-mid: #4d92a3;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #b91c1c;
      --radius: 16px;
      font-family: "DM Sans", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: #0f172a;
      display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
    }
    .card {
      width: 100%; max-width: 420px; background: var(--surface); border-radius: var(--radius);
      padding: 2rem 1.75rem; border: 1px solid var(--border);
      box-shadow: 0 10px 40px -12px rgba(58, 117, 130, 0.12);
    }
    .mark {
      width: 48px; height: 48px; margin: 0 auto 1rem; border-radius: 14px;
      background: linear-gradient(145deg, var(--accent-mid), var(--accent));
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.35rem; font-weight: 700; text-align: center; }
    .sub { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.9rem; text-align: center; line-height: 1.45; }
    label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.85rem; border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; margin-bottom: 1rem; background: #f8fafc;
    }
    input:focus { outline: none; border-color: var(--accent-mid); background: #fff; }
    .btn {
      width: 100%; padding: 0.7rem 1rem; border: none; border-radius: 999px; font-weight: 600; font-size: 0.95rem;
      background: var(--accent); color: #fff; cursor: pointer; margin-top: 0.25rem;
      box-shadow: 0 4px 14px rgba(58, 117, 130, 0.3);
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { margin-top: 1rem; font-size: 0.88rem; min-height: 1.25rem; text-align: center; }
    #msg.ok { color: var(--accent); font-weight: 600; }
    #msg.err { color: var(--danger); }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; text-align: center; line-height: 1.45; }
    .hint code { font-size: 0.78rem; background: #f1f5f9; padding: 0.1rem 0.35rem; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true"></div>
    <h1>Sign in</h1>
    <p class="sub">Use the same email and password you registered with on the server. After sign-in, heartbeats use your Client ID automatically.</p>
    <form id="f" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required maxlength="254" autocomplete="username" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="1" maxlength="128" autocomplete="current-password" placeholder="Password" />

      <button type="submit" class="btn" id="submit">Sign in</button>
    </form>
    <p id="msg"></p>
    <p class="hint">Server must be running at the URL configured for this app (<code>HEARTBEAT_URL</code>).</p>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault();
      var msg = document.getElementById('msg');
      var btn = document.getElementById('submit');
      msg.textContent = '';
      msg.className = '';
      btn.disabled = true;
      try {
        var r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        var d = await r.json().catch(function () { return {}; });
        if (r.ok && d.ok) {
          msg.textContent = d.message || 'Signed in.';
          msg.className = 'ok';
          location.reload();
          return;
        }
        msg.textContent = d.message || 'Sign-in failed.';
        msg.className = 'err';
      } catch (err) {
        msg.textContent = String(err);
        msg.className = 'err';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
